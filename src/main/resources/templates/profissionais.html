<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profissionais</title>
    <meta charset="UTF-8">

    <!-- Bootstrap (visual bonito rápido) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <div class="alert alert-danger"
         th:if="${erro}"
         th:text="${erro}">
    </div>

    <h2 class="mb-4">Lista de Profissionais</h2>

    <!-- 🔎 FILTRO -->
    <form method="get" action="/profissionais" class="row g-3 mb-4">

        <div class="col-md-4">
            <select name="categoria" class="form-select">
                <option value="">Todas as categorias</option>

                <option th:each="c : ${categorias}"
                        th:value="${c}"
                        th:text="${c}"
                        th:selected="${param.categoria == c}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <button type="submit" class="btn btn-primary">
                Filtrar
            </button>
        </div>

    </form>

    <!-- 📋 TABELA -->
    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Nome</th>
            <th>Registro</th>
            <th>Categoria</th>
            <th>Carga Horária</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${pagina.content}">
            <td th:text="${p.nome}"></td>
            <td th:text="${p.registro}"></td>
            <td th:text="${p.categoria}"></td>
            <td th:text="${p.cargaHorariaSemanal}"></td>

            <td>
                <a th:href="@{/editar-profissional/{id}(id=${p.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/deletar-profissional/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Tem certeza que deseja deletar?')">
                    Deletar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 🔢 PAGINAÇÃO -->
    <nav>
        <ul class="pagination" th:if="${pagina.totalPages > 0}">

            <!-- Anterior -->
            <li class="page-item" th:classappend="${pagina.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/profissionais(pagina=${pagina.number - 1}, categoria=${param.categoria})}">
                    Anterior
                </a>
            </li>

            <!-- NÚMEROS DAS PÁGINAS -->
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, pagina.totalPages - 1)}"
                th:classappend="${i == pagina.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/profissionais(pagina=${i}, categoria=${param.categoria})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <!-- Próxima -->
            <li class="page-item" th:classappend="${pagina.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/profissionais(pagina=${pagina.number + 1}, categoria=${param.categoria})}">
                    Próxima
                </a>
            </li>

        </ul>
    </nav>

    <div class="mt-3 d-flex justify-content-between">

        <a href="/" class="btn btn-secondary">
            Voltar ao Menu
        </a>

        <!-- ➕ BOTÃO NOVO -->
        <a href="/cadastro-profissional" class="btn btn-success">
            Novo Profissional
        </a>

    </div>

</div>

</body>
</html>
