<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Profissional</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="mb-4">Cadastro de Profissional</h2>

    <form th:action="@{/profissionais}" th:object="${profissional}" method="post">

        <input type="hidden" th:field="*{id}"/>

        <!-- Nome -->
        <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" th:field="*{nome}" required>
        </div>

        <!-- Registro -->
        <div class="mb-3">
            <label class="form-label">Registro (CRM/COREN)</label>
            <input type="text"
                   th:field="*{registro}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('registro')} ? 'is-invalid'">
            <div class="text-danger"
                 th:if="${#fields.hasErrors('registro')}"
                 th:errors="*{registro}">
            </div>
        </div>

        <!-- Categoria -->
        <div class="mb-3">
            <label class="form-label">Categoria</label>
            <select class="form-select" th:field="*{categoria}" required>
                <option value="">Selecione</option>
                <option th:each="c : ${categorias}"
                        th:value="${c}"
                        th:text="${c}">
                </option>
            </select>
        </div>

        <!-- Carga Horária -->
        <div class="mb-3">
            <label class="form-label">Carga Horária Semanal</label>
            <input type="number" class="form-control" th:field="*{cargaHorariaSemanal}" required>
        </div>

        <!-- Botões -->
        <button type="submit" class="btn btn-success">
            Salvar
        </button>

        <a href="/" class="btn btn-secondary">
            Voltar
        </a>

    </form>

</div>

</body>
</html>
