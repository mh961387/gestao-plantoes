<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Escala</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h2>Escala de Plantões</h2>

    <!-- ERRO -->
    <div th:if="${erro}" class="alert alert-danger">
        <span th:text="${erro}"></span>
    </div>

    <!-- FORM -->
    <form method="post" action="/plantoes" class="row g-3 mb-4">

        <div class="col-md-4">
            <select name="profissionalId" class="form-select" required>
                <option value="">Selecione o profissional</option>
                <option th:each="p : ${profissionais}"
                        th:value="${p.id}"
                        th:text="${p.nome}">
                </option>
            </select>
        </div>

        <div class="col-md-3">
            <input type="date" name="data" class="form-control" required>
        </div>

        <div class="col-md-3">
            <select name="turno" class="form-select" required>
                <option value="">Turno</option>
                <option th:each="t : ${turnos}"
                        th:value="${t}"
                        th:text="${t}">
                </option>
            </select>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Adicionar</button>
        </div>

    </form>

    <!-- ========================= -->
    <!-- 📋 TABELA DE PLANTÕES -->
    <!-- ========================= -->

    <table class="table table-bordered">
        <thead class="table-dark">
        <tr>
            <th>Profissional</th>
            <th>Data</th>
            <th>Turno</th>
            <th>Ação</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${paginaPlantoes.content}">
            <td th:text="${p.profissional.nome}"></td>
            <td th:text="${p.data}"></td>
            <td th:text="${p.turno}"></td>

            <td>
                <a th:href="@{/deletar-plantao/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Excluir plantão?')">
                    Excluir
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- 🔽 PAGINAÇÃO PLANTÕES -->
    <div class="d-flex justify-content-center mt-3"
         th:if="${paginaPlantoes.totalPages > 0}">

        <ul class="pagination">

            <li class="page-item"
                th:classappend="${paginaPlantoes.first} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaPlantao=${paginaPlantoes.number - 1}, paginaProf=${paginaProfissionais.number}, data=${inicioSemana})}">
                    Anterior
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, paginaPlantoes.totalPages - 1)}"
                th:classappend="${i == paginaPlantoes.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaPlantao=${i}, paginaProf=${paginaProfissionais.number}, data=${inicioSemana})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${paginaPlantoes.last} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaPlantao=${paginaPlantoes.number + 1}, paginaProf=${paginaProfissionais.number}, data=${inicioSemana})}">
                    Próximo
                </a>
            </li>

        </ul>

    </div>

    <!-- ========================= -->
    <!-- 🏥 GRADE SEMANAL -->
    <!-- ========================= -->

    <h4 class="mt-5">Grade Semanal</h4>

    <table class="table table-bordered text-center">

        <thead class="table-dark">
        <tr>
            <th>Profissional</th>
            <th>Seg</th>
            <th>Ter</th>
            <th>Qua</th>
            <th>Qui</th>
            <th>Sex</th>
            <th>Sab</th>
            <th>Dom</th>
            <th>Horas</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="prof : ${paginaProfissionais.content}"
            th:with="horas=${horasSemana[prof.id] != null ? horasSemana[prof.id] : 0}"
            th:classappend="${horas >= prof.cargaHorariaSemanal} ? 'table-danger' : ''">

            <td th:text="${prof.nome}"></td>

            <td th:each="i : ${#numbers.sequence(0,6)}"
                th:with="dataDia=${inicioSemana.plusDays(i)},
                         plantao=${grade.containsKey(prof.id) ? grade.get(prof.id).get(dataDia) : null}">

                <span th:if="${plantao != null}"
                      th:text="${plantao.turno == T(com.mh.gestao_plantao.model.Turno).MANHA ? 'M' :
                                plantao.turno == T(com.mh.gestao_plantao.model.Turno).TARDE ? 'T' : 'N'}">
                </span>

                <span th:if="${plantao == null}">-</span>

            </td>

            <td th:text="${horas} + 'h'"></td>

        </tr>

        </tbody>
    </table>

    <!-- 🔽 PAGINAÇÃO PROFISSIONAIS -->
    <div class="d-flex justify-content-center mt-3"
         th:if="${paginaProfissionais.totalPages > 0}">

        <ul class="pagination">

            <li class="page-item"
                th:classappend="${paginaProfissionais.first} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaProf=${paginaProfissionais.number - 1}, paginaPlantao=${paginaPlantoes.number}, data=${inicioSemana})}">
                    Anterior
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, paginaProfissionais.totalPages - 1)}"
                th:classappend="${i == paginaProfissionais.number} ? 'active'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaProf=${i}, paginaPlantao=${paginaPlantoes.number}, data=${inicioSemana})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item"
                th:classappend="${paginaProfissionais.last} ? 'disabled'">

                <a class="page-link"
                   th:href="@{/plantoes(paginaProf=${paginaProfissionais.number + 1}, paginaPlantao=${paginaPlantoes.number}, data=${inicioSemana})}">
                    Próximo
                </a>
            </li>

        </ul>

    </div>

    <!-- LEGENDA -->
    <div class="mt-3">
        <strong>Legenda:</strong>
        M = Manhã | T = Tarde | N = Noite
    </div>

    <a href="/" class="btn btn-secondary">
        Voltar ao Menu
    </a>

</div>

</body>
</html>
